services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=smartlab_db
      - POSTGRES_USER=smartlab_user
      - POSTGRES_PASSWORD=smartlab_password
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgresql://smartlab_user:smartlab_password@db:5432/smartlab_db
    depends_on:
      - db

volumes:
  postgres_data:
